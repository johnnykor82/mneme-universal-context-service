name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
          python -m pip install -e ".[test]"

      - name: Test
        run: python -m pytest -q

      - name: Parity acceptance
        run: python -m pytest tests/test_parity_recovery.py -q

      - name: Compile
        run: python -m compileall -q mneme_service tests scripts

      - name: Build distribution artifacts
        run: python -m build --wheel --sdist --outdir dist

      - name: Boundary checks
        run: |
          python scripts/check_core_boundary.py
          python scripts/check_distribution_boundary.py dist/*.whl dist/*.tar.gz
          python scripts/check_contract_version.py
          python scripts/check_publication_hygiene.py dist/*.whl dist/*.tar.gz
